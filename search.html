<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Quattrocento:wght@400;700&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700;1,900&display=swap"
        rel="stylesheet">
    <title>Search</title>
</head>

<body>
    <header id="search-page">
        <div class="header-nav">
            <input type="text" placeholder="Search">
            <h1>Joliu</h1>
            <a href="#" class="bag-link">Bag</a>
        </div>
    </header>
    <main>
        <hr>
        <div class="results-p">
            <p class="results">6 results for "table"</p>
        </div>
        <hr>
        <div class="products-grid-container">
            <div class="product-card">
                <img src="./public/e840eb105142869.5f841c8ac1d8f.jpg" alt="table-feller" class="card-image">
                <div class="product-description">
                    <p class="product-name">Table Feller</p>
                    <p class="product-price">$1200</p>
                </div>
            </div>
            <div class="product-card">
                <img src="./public/frama-about-2504-arcit18.jpg" alt="shelf-santos" class="card-image">
                <div class="product-description">
                    <p class="product-name">SHELF medina</p>
                    <p class="product-price">$800</p>
                </div>
            </div>
            <div class="product-card">
                <img src="./public/Basica_Minima_Bateria_ClaudiaMaurino_SantaCole_2021_12.jpg" alt="lamp-tuvieja"
                    class="card-image">
                <div class="product-description">
                    <p class="product-name">Light Lamponne</p>
                    <p class="product-price">$200</p>
                </div>
            </div>
        </div>

    </main>
</body>

</html>

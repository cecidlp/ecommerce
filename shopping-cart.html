<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Quattrocento:wght@400;700&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700;1,900&display=swap"
        rel="stylesheet">
    <title>Shopping cart</title>
</head>

<body>
    <header>
        <div class="header-nav">
            <input type="text" placeholder="Search">
            <h1>Joliu</h1>
            <a href="#" class="bag-link">Bag</a>
        </div>
    </header>
    <main>
        <div class="cart-categories">
            <h3>Product</h3>
            <h3>Quantity</h3>
            <h3>Price</h3>
        </div>
        <hr>
        <div class="products">
            <div class="individual-product">
                <img src="./public/frama-about-2504-arcit18.jpg" alt="shelf-santos" class="product-cart-image">
                <div class="counter">
                    <span class="down">-</span>
                    <input type="text" value="1">
                    <span class="up">+</span>
                </div>
                <p class="price">$1200</p>
            </div>            
        </div>
        <hr>
        </div>
        <div class="checkout">
            <p>Total</p>
            <p>$1200</p>
        </div>
    </main>
</body>

</html>
